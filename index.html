<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Поймай кота</title>
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
      position: fixed;
    }
    
    #gameContainer {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    
    #startScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.95);
      color: #00ff00;
      z-index: 100;
      pointer-events: auto;
      padding: 20px;
      box-sizing: border-box;
    }
    
    #startScreen h1 {
      font-size: 8vw;
      margin-bottom: 4vh;
      text-shadow: 0 0 20px #00ff00;
      animation: flicker 2s infinite;
      text-align: center;
    }
    
    #startScreen p {
      font-size: 4vw;
      color: #aaffaa;
      margin: 1vh 0;
      text-align: center;
    }
    
    #startScreen .info {
      font-size: 3.5vw;
      color: #88cc88;
      text-align: center;
      line-height: 5vw;
      margin: 3vh 0;
      padding: 3vh;
      border: 1px solid #00ff0044;
      border-radius: 12px;
      background: rgba(0, 255, 0, 0.05);
    }
    
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
      52% { opacity: 1; }
      70% { opacity: 0.9; }
      72% { opacity: 1; }
    }
    
    #startBtn, #restartBtn {
      pointer-events: auto;
      background: #004400;
      color: #00ff00;
      border: 3px solid #00ff00;
      padding: 3vh 8vw;
      font-size: 5vw;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      border-radius: 16px;
      margin-top: 4vh;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.2s;
      font-weight: bold;
      touch-action: manipulation;
    }
    
    #startBtn:active, #restartBtn:active {
      background: #006600;
      transform: scale(0.97);
    }
    
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 10;
      padding: 10px;
      box-sizing: border-box;
    }
    
    #timeDisplay {
      position: absolute;
      top: 1vh;
      right: 3vw;
      font-size: 5vw;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
      font-weight: bold;
      background: rgba(0, 0, 0, 0.6);
      padding: 1vh 2vw;
      border-radius: 8px;
    }
    
    #missDisplay {
      position: absolute;
      top: 1vh;
      left: 3vw;
      font-size: 4vw;
      color: #ff4444;
      text-shadow: 0 0 8px #ff0000;
      background: rgba(0, 0, 0, 0.6);
      padding: 1vh 2vw;
      border-radius: 8px;
    }
    
    #caughtDisplay {
      position: absolute;
      top: 7vh;
      left: 3vw;
      font-size: 4vw;
      color: #44ff44;
      text-shadow: 0 0 8px #00ff00;
      background: rgba(0, 0, 0, 0.6);
      padding: 1vh 2vw;
      border-radius: 8px;
    }
    
    #statusBar {
      position: absolute;
      top: 1vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3.5vw;
      color: #aaaaff;
      text-shadow: 0 0 8px #5555ff;
      background: rgba(0, 0, 40, 0.85);
      padding: 1vh 3vw;
      border-radius: 20px;
      border: 1px solid #5555ff66;
      white-space: nowrap;
      backdrop-filter: blur(5px);
    }
    
    #cameraPanel {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 2vh 3vw;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2vh;
      z-index: 10;
      pointer-events: auto;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
      backdrop-filter: blur(8px);
    }
    
    #cameraGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2vw;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }
    
    .camBtn {
      background: #1a1a2e;
      color: #7777cc;
      border: 2px solid #4444aa;
      padding: 2vh 1vw;
      font-size: 3.5vw;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.2s;
      text-align: center;
      font-weight: bold;
      touch-action: manipulation;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .camBtn:active {
      background: #2a2a4e;
      transform: scale(0.96);
    }
    
    .camBtn.active {
      background: #2a2a5e;
      border-color: #00aaff;
      color: #00aaff;
      box-shadow: 0 0 15px #00aaff66;
    }
    
    .camBtn.has-cat {
      animation: catPulse 0.8s infinite;
      border-color: #ffaa00;
      color: #ffaa00;
      background: #442200;
    }
    
    @keyframes catPulse {
      0%, 100% { box-shadow: 0 0 5px #ffaa0044; }
      50% { box-shadow: 0 0 20px #ffaa00cc; }
    }
    
    #catchBtn {
      pointer-events: auto;
      background: #442200;
      color: #ffaa00;
      border: 4px solid #ffaa00;
      padding: 3vh 8vw;
      font-size: 6vw;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      border-radius: 60px;
      text-transform: uppercase;
      letter-spacing: 3px;
      transition: all 0.2s;
      animation: catchPulse 0.6s infinite;
      font-weight: bold;
 width: 80%;
      max-width: 300px;
      touch-action: manipulation;
      box-shadow: 0 0 20px rgba(255, 170, 0, 0.3);
    }
    
    #catchBtn:active {
      background: #664400;
      transform: scale(0.96);
    }
    
    @keyframes catchPulse {
      0%, 100% { box-shadow: 0 0 10px #ffaa0044; }
      50% { box-shadow: 0 0 40px #ffaa00cc; }
    }
    
    #notification {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 5vw;
      padding: 3vh 6vw;
      border-radius: 20px;
      z-index: 50;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.5s;
      font-weight: bold;
      white-space: nowrap;
      backdrop-filter: blur(10px);
    }
    
    #notification.success {
      background: rgba(0, 100, 0, 0.95);
      color: #00ff00;
      border: 3px solid #00ff00;
      text-shadow: 0 0 10px #00ff00;
    }
    
    #notification.fail {
      background: rgba(100, 0, 0, 0.95);
      color: #ff4444;
      border: 3px solid #ff4444;
      text-shadow: 0 0 10px #ff0000;
    }
    
    #scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.1) 2px,
        rgba(0, 0, 0, 0.1) 4px
      );
      pointer-events: none;
      z-index: 5;
    }
    
    #gameOverScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.97);
      z-index: 100;
      pointer-events: auto;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    
    #gameOverTitle {
      font-size: 8vw;
      margin-bottom: 3vh;
    }
    
    #gameOverText {
      font-size: 5vw;
      margin: 2vh 0;
    }
    
    #gameOverStats {
      font-size: 4vw;
      color: #aaaaaa;
      margin: 3vh 0;
    }
    
    .win #gameOverTitle {
      color: #00ff00;
      text-shadow: 0 0 20px #00ff00;
    }
    
    .lose #gameOverTitle {
      color: #ff4444;
      text-shadow: 0 0 20px #ff0000;
    }
    
    .win #gameOverText {
      color: #88ff88;
    }
    
    .lose #gameOverText {
      color: #ff8888;
    }
    
    @media (max-width: 480px) {
      .camBtn {
        font-size: 3vw;
        padding: 1.5vh 0.5vw;
      }
      
      #statusBar {
        font-size: 3vw;
        white-space: nowrap;
      }
      
      #timeDisplay {
        font-size: 4vw;
      }
      
      #missDisplay, #caughtDisplay {
        font-size: 3.5vw;
      }
      
      #catchBtn {
        font-size: 5vw;
        padding: 2.5vh 6vw;
      }
    }
    
    @media (orientation: landscape) {
      #cameraGrid {
        grid-template-columns: repeat(6, 1fr);
        max-width: none;
      }
      
      .camBtn {
        font-size: 2.5vw;
        white-space: normal;
        word-break: keep-all;
      }
      
      #catchBtn {
        width: 50%;
        font-size: 4vw;
      }
      
      #statusBar {
        top: 1vh;
      }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
      <div id="startScreen">
        <h1>Поймай кота</h1>
        <p>Ночная смена охранника</p>
        <p class="info">Мониторьте камеры и ловите котов!<br>Если кот появился — нажмите "Поймать кота"<br>Пропустите 3 кота — вы уволены!<br>Продержитесь до 6:00 AM!</p>
        <button id="startBtn">Начать смену</button>
      </div>
      <div id="hud" style="display:none;">
        <div id="timeDisplay">12:00 AM</div>
        <div id="missDisplay">❌ 0 / 3</div>
        <div id="caughtDisplay">🐱 0</div>
        <div id="statusBar">
          <span id="currentCamLabel">📷 Камера: Коридор</span>
        </div>
      </div>
      <div id="cameraPanel" style="display:none;">
        <div id="cameraGrid">
          <button class="camBtn" data-cam="0">Cam 1<br>Коридор</button>
          <button class="camBtn" data-cam="1">Cam 2<br>Кухня</button>
          <button class="camBtn" data-cam="2">Cam 3<br>Склад</button>
          <button class="camBtn" data-cam="3">Cam 4<br>Офис</button>
          <button class="camBtn" data-cam="4">Cam 5<br>Холл</button>
          <button class="camBtn" data-cam="5">Cam 6<br>Серверная</button>
        </div>
        <button id="catchBtn" style="display:none;">Поймать кота!</button>
      </div>
      <div id="notification" style="display:none;"></div>
      <div id="scanlines"></div>
      <div id="gameOverScreen" style="display:none;">
        <h1 id="gameOverTitle"></h1>
        <p id="gameOverText"></p>
        <p id="gameOverStats"></p>
        <button id="restartBtn">Играть снова</button>
      </div>
    </div>
  </div>
  
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>
  
  <script type="module">
    import * as THREE from 'three';
    window.THREE = THREE;
    
    // GameObject3D
    class GameObject3D {
      constructor(scene) {
        this.scene = scene;
        this.mesh = null;
        this.position = new THREE.Vector3();
        this.rotation = new THREE.Euler();
        this.velocity = new THREE.Vector3();
        this.name = 'GameObject3D';
      }
    
      update(dt) {
        if (this.mesh) {
          this.mesh.position.copy(this.position);
          this.mesh.rotation.copy(this.rotation);
        }
      }
    
      getBounds() {
        if (!this.mesh) return null;
        return new THREE.Box3().setFromObject(this.mesh);
      }
    
      destroy() {
        if (this.mesh) this.scene.remove(this.mesh);
      }
    }
    
    // Room
    class Room extends GameObject3D {
      constructor(scene, config) {
        super(scene);
        this.name = config.name || 'Room';
        this.roomId = config.id;
        this.label = config.label;
        this.color = config.color;
        this.floorColor = config.floorColor || 0x333344;
        this.createMesh();
      }
    
      createMesh() {
        this.mesh = new THREE.Group();
    
        const floorGeo = new THREE.PlaneGeometry(8, 8);
        const floorMat = new THREE.MeshLambertMaterial({ color: this.floorColor });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = 0;
        this.mesh.add(floor);
    
        const wallGeo = new THREE.PlaneGeometry(8, 4);
        const wallMat = new THREE.MeshLambertMaterial({ color: this.color, side: THREE.DoubleSide });
        const backWall = new THREE.Mesh(wallGeo, wallMat);
        backWall.position.set(0, 2, -4);
        this.mesh.add(backWall);
    
        const leftWall = new THREE.Mesh(wallGeo, wallMat.clone());
        leftWall.position.set(-4, 2, 0);
        leftWall.rotation.y = Math.PI / 2;
        this.mesh.add(leftWall);
    
        const rightWall = new THREE.Mesh(wallGeo, wallMat.clone());
        rightWall.position.set(4, 2, 0);
        rightWall.rotation.y = -Math.PI / 2;
        this.mesh.add(rightWall);
    
        const ceilGeo = new THREE.PlaneGeometry(8, 8);
        const ceilMat = new THREE.MeshLambertMaterial({ color: 0x444455, side: THREE.DoubleSide });
        const ceiling = new THREE.Mesh(ceilGeo, ceilMat);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = 4;
        this.mesh.add(ceiling);
    
        const lightFixGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.1, 16);
        const lightFixMat = new THREE.MeshBasicMaterial({ color: 0xffffcc });
        const lightFix = new THREE.Mesh(lightFixGeo, lightFixMat);
        lightFix.position.y = 3.9;
        this.mesh.add(lightFix);
    
        const roomLight = new THREE.PointLight(0xffffdd, 1.5, 12);
        roomLight.position.set(0, 3.5, 0);
        this.mesh.add(roomLight);
    
        this.addFurniture();
    
        const labelCanvas = document.createElement('canvas');
        labelCanvas.width = 256;
        labelCanvas.height = 64;
        const ctx = labelCanvas.getContext('2d');
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, 256, 64);
        ctx.fillStyle = '#00ff00';
        ctx.font = 'bold 28px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(this.label, 128, 42);
        const labelTex = new THREE.CanvasTexture(labelCanvas);
        const labelGeo = new THREE.PlaneGeometry(2, 0.5);
        const labelMat = new THREE.MeshBasicMaterial({ map: labelTex });
        const labelMesh = new THREE.Mesh(labelGeo, labelMat);
        labelMesh.position.set(0, 3.5, -3.95);
        this.mesh.add(labelMesh);
    
        this.mesh.position.copy(this.position);
        this.scene.add(this.mesh);
      }
    
      addFurniture() {
        const id = this.roomId;
        if (id === 0) {
          for (let i = 0; i < 3; i++) {
            const pipeGeo = new THREE.CylinderGeometry(0.08, 0.08, 4, 8);
            const pipeMat = new THREE.MeshLambertMaterial({ color: 0x888899 });
            const pipe = new THREE.Mesh(pipeGeo, pipeMat);
            pipe.position.set(-3 + i * 0.4, 2, -3.8);
            this.mesh.add(pipe);
          }
          const boxGeo = new THREE.BoxGeometry(1, 0.8, 0.8);
          const boxMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
          const box1 = new THREE.Mesh(boxGeo, boxMat);
          box1.position.set(2, 0.4, -2);
          this.mesh.add(box1);
          const box2 = new THREE.Mesh(boxGeo, boxMat);
          box2.position.set(2.3, 1.2, -2.1);
          this.mesh.add(box2);
        } else if (id === 1) {
          const counterGeo = new THREE.BoxGeometry(6, 1, 1);
          const counterMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
          const counter = new THREE.Mesh(counterGeo, counterMat);
          counter.position.set(0, 0.5, -3);
          this.mesh.add(counter);
          const fridgeGeo = new THREE.BoxGeometry(1.2, 2.5, 1);
          const fridgeMat = new THREE.MeshLambertMaterial({ color: 0xcccccc });
          const fridge = new THREE.Mesh(fridgeGeo, fridgeMat);
          fridge.position.set(-3, 1.25, -3);
          this.mesh.add(fridge);
        } else if (id === 2) {
          for (let i = 0; i < 3; i++) {
            const shelfGeo = new THREE.BoxGeometry(3, 0.1, 0.8);
            const shelfMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
            const shelf = new THREE.Mesh(shelfGeo, shelfMat);
            shelf.position.set(-2, 1 + i * 1.2, -3.5);
            this.mesh.add(shelf);
          }
          const crateGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
          const crateMat = new THREE.MeshLambertMaterial({ color: 0x6B4226 });
          const crate = new THREE.Mesh(crateGeo, crateMat);
          crate.position.set(2, 0.75, -1);
          this.mesh.add(crate);
        } else if (id === 3) {
          const deskGeo = new THREE.BoxGeometry(2.5, 0.8, 1.2);
          const deskMat = new THREE.MeshLambertMaterial({ color: 0x6B4226 });
          const desk = new THREE.Mesh(deskGeo, deskMat);
          desk.position.set(0, 0.4, -2.5);
          this.mesh.add(desk);
          const monitorGeo = new THREE.BoxGeometry(1, 0.7, 0.1);
          const monitorMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
          const monitor = new THREE.Mesh(monitorGeo, monitorMat);
          monitor.position.set(0, 1.15, -2.5);
          this.mesh.add(monitor);
          const screenMat = new THREE.MeshBasicMaterial({ color: 0x003300 });
          const screen = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 0.6), screenMat);
          screen.position.set(0, 1.15, -2.44);
          this.mesh.add(screen);
          const chairGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
          const chairMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
          const chair = new THREE.Mesh(chairGeo, chairMat);
          chair.position.set(0, 0.3, -1.2);
          this.mesh.add(chair);
        } else if (id === 4) {
          const benchGeo = new THREE.BoxGeometry(3, 0.5, 0.8);
          const benchMat = new THREE.MeshLambertMaterial({ color: 0x6B4226 });
          const bench = new THREE.Mesh(benchGeo, benchMat);
          bench.position.set(0, 0.25, 1);
          this.mesh.add(bench);
          const plantPotGeo = new THREE.CylinderGeometry(0.3, 0.25, 0.5, 8);
          const plantPotMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
          const pot = new THREE.Mesh(plantPotGeo, plantPotMat);
          pot.position.set(3, 0.25, -3);
          this.mesh.add(pot);
          const leavesGeo = new THREE.SphereGeometry(0.5, 8, 8);
          const leavesMat = new THREE.MeshLambertMaterial({ color: 0x228B22 });
          const leaves = new THREE.Mesh(leavesGeo, leavesMat);
          leaves.position.set(3, 0.9, -3);
          this.mesh.add(leaves);
        } else if (id === 5) {
          for (let i = 0; i < 3; i++) {
            const rackGeo = new THREE.BoxGeometry(1.5, 3, 0.8);
            const rackMat = new THREE.MeshLambertMaterial({ color: 0x333344 });
            const rack = new THREE.Mesh(rackGeo, rackMat);
            rack.position.set(-2.5 + i * 2.5, 1.5, -3);
            this.mesh.add(rack);
            for (let j = 0; j < 5; j++) {
              const ledGeo = new THREE.BoxGeometry(0.05, 0.05, 0.05);
              const ledMat = new THREE.MeshBasicMaterial({ color: j % 2 === 0 ? 0x00ff00 : 0x00aa00 });
              const led = new THREE.Mesh(ledGeo, ledMat);
              led.position.set(-2.5 + i * 2.5 + 0.3, 0.8 + j * 0.4, -2.55);
              this.mesh.add(led);
            }
          }
        }
      }
    
      showRoom(visible) {
        this.mesh.visible = visible;
      }
    
      update(dt) {
        super.update(dt);
      }
    }
    
    // Cat
    class Cat extends GameObject3D {
      constructor(scene) {
        super(scene);
        this.name = 'Cat';
        this.isVisible = false;
        this.animTime = 0;
        this.catParts = {};
        this.createMesh();
      }
    
      createMesh() {
        this.mesh = new THREE.Group();
    
        const bodyGeo = new THREE.BoxGeometry(0.6, 0.4, 0.9);
        const bodyMat = new THREE.MeshLambertMaterial({ color: 0xff8833 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.4;
        this.mesh.add(body);
        this.catParts.body = body;
    
        const headGeo = new THREE.BoxGeometry(0.45, 0.4, 0.4);
        const head = new THREE.Mesh(headGeo, bodyMat);
        head.position.set(0, 0.6, 0.55);
        this.mesh.add(head);
        this.catParts.head = head;
    
        const earGeo = new THREE.ConeGeometry(0.08, 0.18, 4);
        const earMat = new THREE.MeshLambertMaterial({ color: 0xff6622 });
        const leftEar = new THREE.Mesh(earGeo, earMat);
        leftEar.position.set(-0.13, 0.88, 0.55);
        this.mesh.add(leftEar);
        const rightEar = new THREE.Mesh(earGeo, earMat);
        rightEar.position.set(0.13, 0.88, 0.55);
        this.mesh.add(rightEar);
    
        const eyeGeo = new THREE.SphereGeometry(0.05, 8, 8);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x44ff44 });
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(-0.1, 0.65, 0.76);
        this.mesh.add(leftEye);
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
        rightEye.position.set(0.1, 0.65, 0.76);
        this.mesh.add(rightEye);
    
        const noseGeo = new THREE.SphereGeometry(0.03, 8, 8);
        const noseMat = new THREE.MeshLambertMaterial({ color: 0xff6699 });
        const nose = new THREE.Mesh(noseGeo, noseMat);
        nose.position.set(0, 0.57, 0.78);
        this.mesh.add(nose);
    
        const legGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.3, 8);
        const legMat = new THREE.MeshLambertMaterial({ color: 0xff8833 });
        const positions = [[-0.2, 0.15, 0.3], [0.2, 0.15, 0.3], [-0.2, 0.15, -0.3], [0.2, 0.15, -0.3]];
        positions.forEach(pos => {
          const leg = new THREE.Mesh(legGeo, legMat);
          leg.position.set(pos[0], pos[1], pos[2]);
          this.mesh.add(leg);
        });
    
        const tailGeo = new THREE.CylinderGeometry(0.04, 0.02, 0.6, 8);
        const tail = new THREE.Mesh(tailGeo, bodyMat);
        tail.position.set(0, 0.5, -0.6);
        tail.rotation.x = -Math.PI / 4;
        this.mesh.add(tail);
        this.catParts.tail = tail;
    
        this.mesh.visible = false;
        this.scene.add(this.mesh);
      }
    
      show(roomPos) {
        this.isVisible = true;
        this.animTime = 0;
        const x = (Math.random() - 0.5) * 4;
        const z = (Math.random() - 0.5) * 4;
        this.position.set(roomPos.x + x, roomPos.y, roomPos.z + z);
        this.rotation.y = Math.random() * Math.PI * 2;
        this.mesh.visible = true;
      }
    
      hide() {
        this.isVisible = false;
        this.mesh.visible = false;
      }
    
      update(dt) {
        if (!this.isVisible) return;
        this.animTime += dt;
        if (this.catParts.tail) {
          this.catParts.tail.rotation.z = Math.sin(this.animTime * 4) * 0.4;
        }
        if (this.catParts.body) {
          this.catParts.body.position.y = 0.4 + Math.sin(this.animTime * 2) * 0.02;
        }
        if (this.catParts.head) {
          this.catParts.head.rotation.y = Math.sin(this.animTime * 1.5) * 0.2;
        }
        super.update(dt);
      }
    }
    
    // Catcher
    class Catcher extends GameObject3D {
      constructor(scene) {
        super(scene);
        this.name = 'Catcher';
        this.isAnimating = false;
        this.animProgress = 0;
        this.animDuration = 2.0;
        this.startPos = new THREE.Vector3();
        this.targetPos = new THREE.Vector3();
        this.holdingCat = false;
        this.catRef = null;
        this.onComplete = null;
        this.createMesh();
      }
    
      createMesh() {
        this.mesh = new THREE.Group();
    
        const bodyGeo = new THREE.BoxGeometry(0.6, 1.0, 0.4);
        const bodyMat = new THREE.MeshLambertMaterial({ color: 0x2244aa });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 1.2;
        this.mesh.add(body);
    
        const headGeo = new THREE.SphereGeometry(0.22, 12, 12);
        const headMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 1.95;
        this.mesh.add(head);
    
        const capGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.12, 12);
        const capMat = new THREE.MeshLambertMaterial({ color: 0x224488 });
        const cap = new THREE.Mesh(capGeo, capMat);
        cap.position.y = 2.12;
        this.mesh.add(cap);
        const brimGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.03, 12);
        const brim = new THREE.Mesh(brimGeo, capMat);
        brim.position.y = 2.07;
        this.mesh.add(brim);
    
        const armGeo = new THREE.BoxGeometry(0.18, 0.7, 0.18);
        const armMat = new THREE.MeshLambertMaterial({ color: 0x2244aa });
        const leftArm = new THREE.Mesh(armGeo, armMat);
        leftArm.position.set(-0.45, 1.0, 0);
        leftArm.rotation.z = 0.3;
        this.mesh.add(leftArm);
        const rightArm = new THREE.Mesh(armGeo, armMat);
        rightArm.position.set(0.45, 1.0, 0);
        rightArm.rotation.z = -0.3;
        this.mesh.add(rightArm);
        this.leftArm = leftArm;
        this.rightArm = rightArm;
    
        const legGeo = new THREE.BoxGeometry(0.2, 0.6, 0.2);
        const legMat = new THREE.MeshLambertMaterial({ color: 0x333355 });
        const leftLeg = new THREE.Mesh(legGeo, legMat);
        leftLeg.position.set(-0.15, 0.4, 0);
        this.mesh.add(leftLeg);
        const rightLeg = new THREE.Mesh(legGeo, legMat);
        rightLeg.position.set(0.15, 0.4, 0);
        this.mesh.add(rightLeg);
    
        this.mesh.visible = false;
        this.scene.add(this.mesh);
      }
    
      startCatch(catPosition, cat, onComplete) {
        this.isAnimating = true;
        this.animProgress = 0;
        this.holdingCat = false;
        this.catRef = cat;
        this.onComplete = onComplete;
        this.startPos.set(catPosition.x + 5, catPosition.y, catPosition.z);
        this.targetPos.copy(catPosition);
        this.mesh.position.copy(this.startPos);
        this.mesh.visible = true;
        this.rotation.y = Math.atan2(this.targetPos.x - this.startPos.x, this.targetPos.z - this.startPos.z) + Math.PI;
      }
    
      update(dt) {
        if (!this.isAnimating) return;
        this.animProgress += dt / this.animDuration;
        if (this.animProgress < 0.5) {
          const t = this.animProgress / 0.5;
          this.mesh.position.lerpVectors(this.startPos, this.targetPos, t);
          if (this.leftArm) this.leftArm.rotation.z = 0.3 + Math.sin(this.animProgress * 20) * 0.3;
          if (this.rightArm) this.rightArm.rotation.z = -0.3 - Math.sin(this.animProgress * 20) * 0.3;
        } else if (this.animProgress < 0.6) {
          if (!this.holdingCat && this.catRef) {
            this.holdingCat = true;
            this.catRef.hide();
            if (this.leftArm) this.leftArm.rotation.z = 0.8;
            if (this.rightArm) this.rightArm.rotation.z = -0.8;
          }
        } else if (this.animProgress < 1.0) {
          const t = (this.animProgress - 0.6) / 0.4;
          this.mesh.position.lerpVectors(this.targetPos, this.startPos, t);
        } else {
          this.isAnimating = false;
          this.mesh.visible = false;
          if (this.onComplete) this.onComplete();
        }
        super.update(dt);
      }
    }
    
    // Game
    class Game {
      constructor() {
        this.entities = [];
        this.isRunning = false;
        this.currentCam = 0;
        this.catsCaught = 0;
        this.catsMissed = 0;
        this.maxMisses = 3;
        this.gameTime = 0;
        this.nightDuration = 180;
        this.catSpawnTimer = 0;
        this.catSpawnInterval = 8;
        this.catTimeInRoom = 12;
        this.activeCatRoom = -1;
        this.catTimeLeft = 0;
        this.isCatching = false;
    
        this.canvas = document.getElementById('gameCanvas');
        this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: true });
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.shadowMap.enabled = true;
    
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x111118);
    
        this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        this.camera.position.set(0, 3, 5);
    
        const ambient = new THREE.AmbientLight(0x666688, 1.0);
        this.scene.add(ambient);
    
        this.roomConfigs = [
          { id: 0, name: 'Room_Corridor', label: 'CAM 1: Коридор', color: 0x555566, floorColor: 0x444455 },
          { id: 1, name: 'Room_Kitchen', label: 'CAM 2: Кухня', color: 0x556655, floorColor: 0x445544 },
          { id: 2, name: 'Room_Storage', label: 'CAM 3: Склад', color: 0x665555, floorColor: 0x554444 },
          { id: 3, name: 'Room_Office', label: 'CAM 4: Офис', color: 0x555577, floorColor: 0x444466 },
          { id: 4, name: 'Room_Hall', label: 'CAM 5: Холл', color: 0x557755, floorColor: 0x446644 },
          { id: 5, name: 'Room_Server', label: 'CAM 6: Серверная', color: 0x445566, floorColor: 0x334455 }
        ];
    
        this.rooms = [];
        this.roomConfigs.forEach((config, i) => {
          const room = new Room(this.scene, config);
          room.position.set(i * 20, 0, 0);
          room.mesh.position.copy(room.position);
          room.showRoom(i === 0);
          this.rooms.push(room);
          this.entities.push(room);
        });
    
        this.cat = new Cat(this.scene);
        this.entities.push(this.cat);
    
        this.catcher = new Catcher(this.scene);
        this.entities.push(this.catcher);
    
        this.noiseTime = 0;
    
        this.startScreen = document.getElementById('startScreen');
        this.hud = document.getElementById('hud');
        this.cameraPanel = document.getElementById('cameraPanel');
        this.timeDisplay = document.getElementById('timeDisplay');
        this.missDisplay = document.getElementById('missDisplay');
        this.caughtDisplay = document.getElementById('caughtDisplay');
        this.currentCamLabel = document.getElementById('currentCamLabel');
        this.catchBtn = document.getElementById('catchBtn');
        this.notification = document.getElementById('notification');
        this.gameOverScreen = document.getElementById('gameOverScreen');
        this.gameOverTitle = document.getElementById('gameOverTitle');
        this.gameOverText = document.getElementById('gameOverText');
        this.gameOverStats = document.getElementById('gameOverStats');
    
        document.getElementById('startBtn').onclick = () => this.startGame();
        document.getElementById('restartBtn').onclick = () => this.restart();
        this.catchBtn.onclick = () => this.catchCat();
    
        document.querySelectorAll('.camBtn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            const camIndex = parseInt(btn.dataset.cam);
            this.switchCamera(camIndex);
          });
          btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const camIndex = parseInt(btn.dataset.cam);
            this.switchCamera(camIndex);
          });
        });
    
        this.updateCamButtons();
        this.clock = new THREE.Clock();
        window.addEventListener('resize', () => this.onResize());
        this.onResize();
      }
    
      startGame() {
        this.isRunning = true;
        this.startScreen.style.display = 'none';
        this.hud.style.display = 'block';
        this.cameraPanel.style.display = 'flex';
        this.gameOverScreen.style.display = 'none';
        this.gameTime = 0;
        this.catsCaught = 0;
        this.catsMissed = 0;
        this.activeCatRoom = -1;
        this.catSpawnTimer = 5;
        this.isCatching = false;
        this.cat.hide();
        this.catcher.isAnimating = false;
        this.catcher.mesh.visible = false;
        this.switchCamera(0);
      }
    
      restart() {
        this.startGame();
      }
    
      switchCamera(index) {
        this.currentCam = index;
        this.rooms.forEach((room, i) => {
          room.showRoom(i === index);
        });
        const room = this.rooms[index];
        this.camera.position.set(room.position.x, 3, room.position.z + 5);
        this.camera.lookAt(room.position.x, 1.5, room.position.z);
        this.currentCamLabel.textContent = this.roomConfigs[index].label;
        this.noiseTime = 0.3;
        this.updateCamButtons();
        this.updateCatchButton();
      }
    
      updateCamButtons() {
        document.querySelectorAll('.camBtn').forEach((btn, i) => {
          btn.classList.toggle('active', i === this.currentCam);
          btn.classList.toggle('has-cat', i === this.activeCatRoom);
        });
      }
    
      updateCatchButton() {
        const catInView = this.activeCatRoom === this.currentCam && !this.isCatching;
        this.catchBtn.style.display = catInView ? 'block' : 'none';
      }
    
      spawnCat() {
        if (this.activeCatRoom !== -1 || this.isCatching) return;
        const roomIndex = Math.floor(Math.random() * this.rooms.length);
        this.activeCatRoom = roomIndex;
        this.catTimeLeft = this.catTimeInRoom;
        const room = this.rooms[roomIndex];
        this.cat.show(room.position);
        this.updateCamButtons();
        this.updateCatchButton();
        if (navigator.vibrate) navigator.vibrate(200);
      }
    
      catchCat() {
        if (this.activeCatRoom !== this.currentCam || this.isCatching) return;
        this.isCatching = true;
        this.catchBtn.style.display = 'none';
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        this.catcher.startCatch(this.cat.position.clone(), this.cat, () => {
          this.catsCaught++;
          this.isCatching = false;
          this.activeCatRoom = -1;
          this.catSpawnTimer = 6 + Math.random() * 6;
          this.updateCamButtons();
          this.updateCatchButton();
          this.showNotification('Кот пойман! +1', 'success');
          this.updateHUD();
        });
      }
    
      missCat() {
        this.catsMissed++;
        this.activeCatRoom = -1;
        this.cat.hide();
        this.catSpawnTimer = 4 + Math.random() * 4;
        this.updateCamButtons();
        this.updateCatchButton();
        this.showNotification('Кот сбежал! ' + this.catsMissed + '/' + this.maxMisses, 'fail');
        this.updateHUD();
        if (navigator.vibrate) navigator.vibrate(500);
        if (this.catsMissed >= this.maxMisses) {
          this.endGame(false);
        }
      }
    
      showNotification(text, type) {
        this.notification.textContent = text;
        this.notification.className = type;
        this.notification.style.display = 'block';
        this.notification.style.opacity = '1';
        setTimeout(() => {
          this.notification.style.opacity = '0';
          setTimeout(() => {
            this.notification.style.display = 'none';
          }, 500);
        }, 2000);
      }
    
      updateHUD() {
        const progress = Math.min(this.gameTime / this.nightDuration, 1);
        let hour = Math.floor(progress * 6);
        const minute = Math.floor((progress * 6 % 1) * 60);
        if (hour === 0) hour = 12;
        this.timeDisplay.textContent = hour + ':' + String(minute).padStart(2, '0') + ' AM';
        this.missDisplay.textContent = '❌ ' + this.catsMissed + ' / ' + this.maxMisses;
        this.caughtDisplay.textContent = '🐱 ' + this.catsCaught;
      }
    
      endGame(won) {
        this.isRunning = false;
        this.hud.style.display = 'none';
        this.cameraPanel.style.display = 'none';
        this.gameOverScreen.style.display = 'flex';
        if (won) {
          this.gameOverScreen.className = 'win';
          this.gameOverTitle.textContent = '6:00 AM!';
          this.gameOverText.textContent = 'Вы продержались до утра!';
        } else {
          this.gameOverScreen.className = 'lose';
          this.gameOverTitle.textContent = 'Вы уволены!';
          this.gameOverText.textContent = 'Слишком много котов сбежало!';
        }
        this.gameOverStats.textContent = 'Поймано: ' + this.catsCaught + ' | ❌ Пропущено: ' + this.catsMissed;
      }
    
      onResize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        this.camera.aspect = w / h;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(w, h);
      }
    
      update() {
        const dt = Math.min(this.clock.getDelta(), 0.033);
        if (!this.isRunning) return;
        this.gameTime += dt;
        this.updateHUD();
        if (this.gameTime >= this.nightDuration) {
          this.endGame(true);
          return;
        }
        if (this.activeCatRoom === -1 && !this.isCatching) {
          this.catSpawnTimer -= dt;
          if (this.catSpawnTimer <= 0) this.spawnCat();
        }
        if (this.activeCatRoom !== -1 && !this.isCatching) {
          this.catTimeLeft -= dt;
          if (this.catTimeLeft <= 0) this.missCat();
        }
        const progress = this.gameTime / this.nightDuration;
        this.catTimeInRoom = Math.max(6, 12 - progress * 5);
        this.catSpawnInterval = Math.max(4, 8 - progress * 3);
        if (this.noiseTime > 0) this.noiseTime -= dt;
        this.entities.forEach(e => e.update(dt));
      }
    
      render() {
        if (this.noiseTime > 0) {
          this.scene.background = new THREE.Color(Math.random() > 0.5 ? 0x222230 : 0x111118);
        } else {
          this.scene.background = new THREE.Color(0x111118);
        }
        this.renderer.render(this.scene, this.camera);
      }
    
      start() {
        this.clock.start();
        const gameLoop = () => {
          requestAnimationFrame(gameLoop);
          this.update();
          this.render();
        };
        gameLoop();
      }
    }
    
    const game = new Game();
    window.game = game;
    game.start();
  </script>
</body>
</html>
